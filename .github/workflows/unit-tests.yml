name: Unit Tests

on: [push, pull_request]

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest numpy motmetrics

      - name: Run unit tests
        run: pytest tests/unit/ -q --tb=short
