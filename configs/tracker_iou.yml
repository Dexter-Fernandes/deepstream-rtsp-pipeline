%YAML:1.0
# IOU tracker — greedy IOU-only matching, no Kalman filter, no appearance.
# Fastest, lowest VRAM. MOT17 baseline before appearance features.

BaseConfig:
  minDetectorConfidence: 0.25    # matches --conf-threshold default

TargetManagement:
  maxTargetsPerStream: 150       # pedestrian-heavy MOT17 scenes
  minIouDiff4NewTarget: 0.5
  probationAge: 4
  maxShadowTrackingAge: 38
  earlyTerminationAge: 1

TrajectoryManagement:
  useUniqueID: 0

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 0      # GREEDY — pure IOU matching
  checkClassMatch: 1
  minMatchingScore4Overall: 0.0
  minMatchingScore4SizeSimilarity: 0.0
  minMatchingScore4Iou: 0.0
  matchingScoreWeight4SizeSimilarity: 0.4
  matchingScoreWeight4Iou: 0.6
