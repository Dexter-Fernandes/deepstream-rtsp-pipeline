# Run mediamtx from the project root:
#   PROJECT_ROOT=$(pwd) mediamtx configs/mediamtx.yml

paths:
  stream0:
    # MOT17-04: benchmark sequence (static camera, high density, 1050 frames, has GT)
    runOnInit: >
      ffmpeg -re -stream_loop -1
      -i $PROJECT_ROOT/data/mot17_04.mp4
      -c copy -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes

  stream1:
    # MOT17-13: visual demo sequence (busy crossing)
    runOnInit: >
      ffmpeg -re -stream_loop -1
      -i $PROJECT_ROOT/data/mot17_13.mp4
      -c copy -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes

  stream2:
    # MOT17-02: multi-stream third feed (high density, different scene)
    runOnInit: >
      ffmpeg -re -stream_loop -1
      -i $PROJECT_ROOT/data/mot17_02.mp4
      -c copy -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes
